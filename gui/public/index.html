<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dactyl ZMK Configurator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Dactyl ZMK Configurator</h1>
            <div class="header-actions">
                <button id="save-btn" class="btn primary">Save Keymap</button>
                <button id="push-btn" class="btn success">Push to GitHub</button>
            </div>
        </header>

        <div class="layer-tabs" id="layer-tabs">
            <button class="layer-tab active" data-layer="default_layer">Default Layer</button>
            <button class="layer-tab" data-layer="settings_layer">Settings Layer</button>
        </div>

        <main>
            <div class="keyboard-container">
                <div class="keyboard-half left-half" id="left-keyboard"></div>
                <div class="keyboard-half right-half" id="right-keyboard"></div>
            </div>

            <div class="palette-container">
                <h2>Key Palette (Drag to assign)</h2>
                <div class="key-palette" id="key-palette">
                    <!-- Common keys will be injected here -->
                </div>
            </div>
            
            <div class="saved-profiles">
            <h2>Saved Profiles (Browser Storage)</h2>
            <div class="profile-actions">
                <input type="text" id="profile-name" placeholder="Name this keymap layout...">
                <button id="save-profile-btn" class="btn primary">Save to GUI</button>
            </div>
            <ul id="profile-list" class="profile-list"></ul>
        </div>

        <div class="raw-code">
                <h2>Raw Keymap View</h2>
                <textarea id="raw-keymap" readonly></textarea>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="main.js"></script>
</body>
</html>
